aid: bob
name: HiBob
description: >-
  HiBob is a modern HR platform (known as Bob) offering a REST API for managing
  employee profiles, onboarding, time off, attendance, payroll integration,
  goals, documents, workforce planning, and company culture data. The API
  supports service user authentication and webhooks for event-driven integrations
  across HR workflows.
