apis:
  - aid: bob:bob-api
    name: HiBob Bob API
    description: >-
      REST API for the HiBob HR platform providing programmatic access to
      employee data, time off management, attendance, tasks, reports, documents,
      goals, job catalog, workforce planning, hiring, and learning modules.
      Authentication uses HTTP Basic Auth with Base64-encoded service user
      credentials.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
